# =====================================================================
# TEST-ONLY configuration (profile: "test")
# ---------------------------------------------------------------------
# Purpose: guarantee that the backend test suite NEVER connects to the
# Railway / production MySQL database. This profile fully overrides the
# datasource defined in src/main/resources/application.properties.
#
# Uses an in-memory H2 database in MySQL compatibility mode so that the
# MySQL-specific column types used by some entities (LONGTEXT / TEXT)
# are understood when Hibernate creates the schema.
# =====================================================================

# In-memory H2, MySQL compatibility mode. No host, no credentials, nothing production.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Recreate the schema from the JPA entities for the test run, then drop it.
spring.jpa.hibernate.ddl-auto=create-drop

# Use the H2 dialect for tests (overrides the MySQL dialect from the main config).
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Keep test logs quiet.
spring.jpa.show-sql=false